<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marlie's MLRI Work</title>
<meta name="description" content="Draft prototypes and tools from Marlie at MLRI.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#fbf8f1;
    --ink:#221f1a;
    --muted:#6b6255;
    --rule:#e4ddcd;
    --accent:#3a5a40;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
  html,body{margin:0}
  body{
    font-family:'Atkinson Hyperlegible',system-ui,-apple-system,sans-serif;
    color:var(--ink);background:var(--paper);min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit}
  :focus-visible{outline:2.5px solid var(--accent);outline-offset:3px;border-radius:3px}

  .wrap{max-width:560px;margin:0 auto;padding:40px max(20px,env(safe-area-inset-left)) 56px max(20px,env(safe-area-inset-right))}

  header{margin-bottom:28px}
  h1{font-family:'Fraunces',Georgia,serif;font-weight:600;
    font-size:clamp(26px,6vw,32px);letter-spacing:-.02em;margin:0 0 6px;line-height:1.15}
  .lead{font-size:16px;line-height:1.45;color:var(--muted);margin:0}

  .list{margin-top:28px;border-top:1px solid var(--rule)}
  .entry{padding:18px 0;border-bottom:1px solid var(--rule)}
  .entry h2{font-family:'Fraunces',Georgia,serif;font-weight:600;
    font-size:20px;letter-spacing:-.01em;margin:0 0 4px;line-height:1.25}
  .entry p{font-size:15px;line-height:1.45;color:var(--muted);margin:0 0 10px}
  .go{font-size:15px;font-weight:700;color:var(--accent);text-decoration:none}
  .go:hover{text-decoration:underline;text-underline-offset:3px}

  .foot{
    margin-top:28px;padding:16px 18px;
    font-size:14px;line-height:1.5;color:var(--muted);
    border:1px solid var(--rule);border-radius:10px;background:#fffef9;
  }
  .foot a{color:var(--accent);text-decoration:underline;text-underline-offset:3px}
</style>
</head>
<body>

<div class="wrap">
  <header>
    <h1>Marlie's MLRI Work</h1>
    <p class="lead">Draft prototypes. Open a project to preview it.</p>
  </header>

  <div class="list">
    <div class="entry">
      <h2>Court Forms Online</h2>
      <p>Accessible redesigns of court &amp; benefits tools, starting with SNAP screening.</p>
      <a class="go" href="court-forms/">Open project →</a>
    </div>
  </div>

  <p class="foot">More coming — and I'd love your comments, suggestions, or feedback. Reach me at <a href="mailto:mcreed@mlri.org">mcreed@mlri.org</a> (email or Slack).</p>
</div>

</body>
</html>

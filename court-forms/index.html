<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Court Forms Online · Marlie's MLRI Work</title>
<meta name="description" content="Court Forms Online — accessible, plain-language redesigns of court and benefits tools.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{--navy:#0a2b52;--blue:#134a8e;--soft:#eaf1fb;--yellow:#f4bd3f;--green:#1e7a45;--green-bg:#eaf6ee;--bg:#eef1f6;--ink:#16202e;--muted:#5b6675}
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
  html,body{margin:0}
  body{font-family:'Atkinson Hyperlegible',system-ui,-apple-system,sans-serif;color:var(--ink);background:var(--bg);min-height:100vh;overflow-x:hidden}
  a{color:var(--blue);text-underline-offset:3px}
  a:hover{color:var(--navy)}
  :focus-visible{outline:3px solid var(--navy);outline-offset:2px;border-radius:6px}
  .page{max-width:600px;margin:0 auto;padding:40px max(16px,env(safe-area-inset-right)) 72px max(16px,env(safe-area-inset-left))}
  h1{font-size:clamp(26px,6.5vw,34px);line-height:1.18;margin:0 0 12px;letter-spacing:-.01em}
  .lead{font-size:clamp(17px,4.2vw,19px);line-height:1.55;color:#37414f;margin:0 0 28px}
  .row{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid #e3e8f0;border-radius:14px;
    padding:18px 20px;text-decoration:none;color:inherit;box-shadow:0 1px 2px rgba(16,32,56,.06);
    transition:border-color .15s ease,transform .15s ease}
  .row:hover{border-color:#c4d1e6;transform:translateY(-1px)}
  .dot{width:40px;height:40px;border-radius:11px;flex:none;display:flex;align-items:center;justify-content:center;font-size:21px;background:var(--green-bg);color:var(--green)}
  .row .body{flex:1;min-width:0}
  .row .t{font-size:18px;font-weight:700;line-height:1.25}
  .row .d{font-size:15px;color:var(--muted);line-height:1.45;margin-top:2px}
  .row .arrow{color:var(--blue);font-weight:700;flex:none}
</style>
</head>
<body>

<!-- ===== TOP NAV ===== -->
<div style="background:var(--navy);color:#fff">
  <div style="max-width:600px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:24px;height:31px;border-radius:5px 5px 3px 3px;background:linear-gradient(var(--yellow),#e79a1f);position:relative;flex:none">
        <div style="position:absolute;left:50%;top:6px;transform:translateX(-50%);width:4px;height:18px;background:var(--navy);border-radius:2px"></div>
      </div>
      <div style="font-size:18px;font-weight:700">Court Forms Online</div>
    </div>
    <a href="../" style="font-size:15px;color:#cfe0f5;text-decoration:none">← Marlie's MLRI Work</a>
  </div>
</div>

<div class="page">

  <h1>Court Forms Online</h1>
  <p class="lead">Accessible, plain-language redesigns of court and benefits tools.</p>

  <a class="row" href="snap-screening.html">
    <div class="dot" aria-hidden="true">📋</div>
    <div class="body">
      <div class="t">SNAP work rules screening</div>
      <div class="d">Try the tool, see sample results, and read how it works.</div>
    </div>
    <span class="arrow" aria-hidden="true">→</span>
  </a>

</div>

</body>
</html>

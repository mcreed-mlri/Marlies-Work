<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SNAP ABAWD Work Rules Screening · Court Forms Online</title>
<meta name="description" content="A short, private screening to check whether the SNAP ABAWD work rules apply to you, or whether you are exempt or already meeting them.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#1a5fb4;
    --accent-dark:#124a8f;
    --soft:#e8f0fb;
    --bg:#eef2f7;
    --ink:#1b1f27;
    --radius:10px;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
  html,body{margin:0}
  body{
    font-family:'Atkinson Hyperlegible',system-ui,-apple-system,sans-serif;
    color:var(--ink);
    background:var(--bg);
    min-height:100vh;
    overflow-x:hidden;
  }
  a{color:var(--accent);text-decoration:underline;text-underline-offset:2px}
  a:hover{color:var(--accent-dark)}
  button{font-family:inherit;touch-action:manipulation}
  :focus-visible{outline:3px solid var(--accent-dark);outline-offset:2px;border-radius:4px}
  @keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .card-in{animation:cardIn .3s ease both}
  .opt{
    display:flex;align-items:center;gap:13px;width:100%;
    font-family:inherit;font-size:16.5px;font-weight:700;text-align:left;
    padding:16px 18px;border:2px solid #d3d9e2;border-radius:var(--radius);
    background:#fff;cursor:pointer;color:var(--ink);line-height:1.35;
    box-shadow:0 0 0 3px transparent;min-height:52px;
    transition:background .15s ease,border-color .15s ease,box-shadow .15s ease;
    -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  }
  .opt:hover{border-color:#a8b4c8;background:#f7f9fc}
  .opt:active{background:var(--soft)}
  .opt-selected{
    border-color:var(--accent);background:var(--soft);
    box-shadow:inset 0 0 0 1px var(--accent),0 0 0 3px rgba(26,95,180,.16);
  }
  .opt-selected:hover{border-color:var(--accent);background:var(--soft)}
  .opt-mark{
    width:24px;height:24px;flex:none;border-radius:50%;
    border:2px solid #b9c1cd;background:#fff;color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:700;transition:border-color .15s ease,background .15s ease;
  }
  .opt-mark.square{border-radius:6px}
  .opt-selected .opt-mark{border-color:var(--accent);background:var(--accent)}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  .topbar{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:12px max(16px, env(safe-area-inset-right)) 12px max(16px, env(safe-area-inset-left));
    background:var(--accent);color:#fff;
  }
  .topbar-brand{display:flex;align-items:center;gap:12px;min-width:0}
  .topbar-title{font-size:15px;font-weight:700;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .topbar-sub{font-size:12px;opacity:.85;line-height:1.2}
  .btn-exit{
    flex:none;font-size:13px;font-weight:700;color:var(--accent);background:#fff;border:none;
    border-radius:999px;padding:10px 14px;cursor:pointer;min-height:44px;
  }
  #stage{
    max-width:660px;margin:0 auto;
    padding:22px max(16px, env(safe-area-inset-right)) 60px max(16px, env(safe-area-inset-left));
  }
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0 0}
  .q-nav{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:28px 0 0;flex-wrap:wrap}
  .h1{font-size:clamp(24px,6vw,29px);line-height:1.2;margin:8px 0 16px;letter-spacing:-.01em}
  .h2{font-size:clamp(21px,5.5vw,25px);line-height:1.25;margin:6px 0 0;letter-spacing:-.01em}
  .h-result{font-size:clamp(21px,5.5vw,26px);line-height:1.25;margin:6px 0 0}
  input,textarea,select{font-size:16px;max-width:100%}
  @media (max-width:640px){
    .topbar-sub{display:none}
    #stage{padding:16px max(14px, env(safe-area-inset-right)) 48px max(14px, env(safe-area-inset-left))}
    .form-row{grid-template-columns:1fr}
    .opt{font-size:16px;padding:15px 14px}
    .q-nav > button{flex:1 1 auto;min-width:min(100%,140px);text-align:center}
    #start-btn{width:100%}
  }
  @media (prefers-reduced-motion:reduce){
    .card-in{animation:none}
    .opt,.opt-mark{transition:none}
  }
  /* Off-screen (not display:none) so the signature image can decode before print. */
  #print-root{position:fixed;left:-10000px;top:0;width:8.5in;pointer-events:none}
  @media print{
    @page{margin:0}
    .no-print{display:none !important}
    body{background:#fff !important}
    body.printing-form > *{display:none !important}
    body.printing-form > #print-root{
      display:block !important;position:static !important;left:auto !important;
      width:auto !important;pointer-events:auto;padding:0.6in;
    }
    #print-root img{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }
</style>
</head>
<body>

<!-- Top bar -->
<div class="no-print topbar">
  <div class="topbar-brand">
    <div style="width:30px;height:30px;border-radius:7px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex:none">CF</div>
    <div style="min-width:0">
      <div class="topbar-title">Court Forms Online</div>
      <div class="topbar-sub">SNAP · ABAWD Work Rules Screening</div>
    </div>
  </div>
  <button type="button" class="btn-exit" data-action="quick-exit" title="Leave this site quickly">Quick exit ✕</button>
</div>

<!-- Progress -->
<div id="progress" class="no-print"></div>

<!-- Stage -->
<main id="stage"></main>

<script>
"use strict";

/* ------------------------------------------------------------------ *
 * Screening content — faithful port of the ABAWD Screening design.
 * Nothing here is sent anywhere; all state lives in this page only.
 * ------------------------------------------------------------------ */

const QUESTIONS = [
  {id:'child14', type:'yn', text:'Do you live with a child under 14 years old?', help:'If you live with a child under 14 who should be part of your SNAP household — even if they are not eligible (for example, because of immigration status or if they are a foster child) — select "Yes."', exemptOn:'yes', reason:'Live with a child under 14 years old'},
  {id:'health', type:'yn', text:'Do you have a health reason or disability that makes it hard to work at least 30 hours a week?', exemptOn:'yes', reason:'Have a health reason that makes it hard to work 30 or more hours a week'},
  {id:'child6', type:'yn', text:'Do you take care of a child under 6 years old?', help:'You do not need to be related to them, live with them, or provide care full-time.', exemptOn:'yes', reason:'Take care of a child under 6 years old'},
  {id:'caretaker', type:'yn', text:'Do you take care of a child or adult who cannot care for themselves?', help:'You do not need to be related to them, live with them, or provide care full-time.', exemptOn:'yes', reason:'Take care of a child or adult who cannot care for themselves'},
  {id:'pregnant', type:'yn', text:'Are you pregnant?', exemptOn:'yes', reason:'Pregnant'},
  {id:'housing', type:'yn', text:'Do you have a regular place to sleep at night?', help:'Choose "No" if you are experiencing homelessness or unstable housing.'},
  {id:'housingFollowup', type:'multi', text:'Please choose all that apply:', help:'DTA looks at these when you do not have a regular place to sleep. They help decide whether you are unable to work under the ABAWD screening.', options:['I have a high school diploma (including GED or HiSet)','I regularly see a health care provider for an ongoing illness, like a dentist, therapist, psychiatrist, or doctor for ongoing treatment','I have had a steady job for at least 6 months in the last year','I have been a full-time student for at least 6 months in the last year','I have been hospitalized in the last 6 months'], noneLabel:'None of the above', showIf:{id:'housing', val:'no'}},
  {id:'dv', type:'yn', text:'Has a domestic violence or safety situation made it hard for you to work?', help:'DTA has domestic violence specialists in each local office who can help. Your answer stays private.', exemptOn:'yes', reason:'A domestic violence or safety situation'},
  {id:'tribe', type:'yn', text:'Are you an Alaska Native or a member of an American Indian, Urban Indian, or California Indian tribe?', help:'Choose "Yes" if you have a parent or grandparent who is a member of one of these tribes.', exemptOn:'yes', reason:'Alaska Native or member of a Tribe'},
  {id:'tafdc', type:'yn', text:'Do you get, or are you applying for, TAFDC cash assistance benefits?', exemptOn:'yes', reason:'Get or applying for TAFDC cash assistance'},
  {id:'disability', type:'multi', text:'Do you get any of these disability benefits?', options:['EAEDC','Veteran’s disability benefit','Workers’ compensation','Paid Family Medical Leave','Short-term disability','SSI or SSDI','Other'], noneLabel:'None of the above', exemptIfAny:true, reason:'Get disability benefits'},
  {id:'unemployment', type:'yn', text:'Do you get, or are you applying for, unemployment benefits?', exemptOn:'yes', reason:'Get unemployment benefits'},
  {id:'stateagency', type:'yn', text:'Do you get services from any of these state agencies?', help:'MassAbility, Dept. of Mental Health, Dept. of Developmental Services, MA Commission for the Blind, or MA Commission for the Deaf and Hard of Hearing.', exemptOn:'yes', reason:'Get services from a state agency'},
  {id:'school', type:'yn', text:'Are you enrolled in school half-time or more?', help:'This includes high school, vocational/technical school, college, or any education and training program.', exemptOn:'yes', reason:'Enrolled in school half-time or more'},
  {id:'working', type:'single', text:'Are you currently working for pay?', help:'Choose the option that applies to you.', options:['I make $217.50 a week or more (before taxes)','I work at least 14.5 hours a week at $15+ an hour','I work 30 hours or more a week (I make less than minimum wage)'], noneLabel:'None of the above', exemptIfAny:true, reason:'Working enough hours to meet the work rules'},
];

const GOODCAUSE = {id:'goodcause', type:'single', text:'Are there other reasons it’s hard for you to work, go to school, or do community service right now?', help:'These are situations where you missed work, school, or volunteering hours for one or more months because of an unexpected life event.', options:['Yes, I have temporary transportation issues','Yes, I have a family or personal emergency','Yes, I’m dealing with an unreasonable employment situation'], noneLabel:'This doesn’t apply to me / I’m not sure'};

const GC_TEXT = {
  'Yes, I have temporary transportation issues':'No transportation — a temporary loss of transportation, such as a broken-down car or a public transit shutdown.',
  'Yes, I have a family or personal emergency':'Emergency — any family or personal crisis, or a situation where you need to give care or support to others.',
  'Yes, I’m dealing with an unreasonable employment situation':'Employment issues — for example, a workplace that discriminates, or unreasonable job conditions.'
};

const NONE = '__none';

/* Questions are shown a few at a time, grouped by theme. Each group is
 * one page; the good-cause question is a final step on its own. */
const GROUPS = [
  {title:'Children and people you care for', ids:['child14','child6','caretaker','pregnant']},
  {title:'Your health, housing, and safety', ids:['health','housing','housingFollowup','dv']},
  {title:'Benefits and cash assistance', ids:['tafdc','disability','unemployment','stateagency']},
  {title:'School, work, and background', ids:['school','working','tribe']},
];
const Q_BY_ID = {};
for(const q of QUESTIONS){ Q_BY_ID[q.id] = q; }

/* ------------------------------------------------------------------ *
 * State + logic (ports the DCLogic Component)
 * ------------------------------------------------------------------ */

const state = { view:'intro', step:0, gc:false, helpOpen:{}, agreed:false, answers:{}, animate:true };

/* ---- Local, 1-day retention -------------------------------------- *
 * Answers are kept only in this browser (never sent anywhere) and are
 * discarded automatically after RETENTION_MS. The results screen also
 * offers an explicit "Delete my answers" control.
 * ------------------------------------------------------------------ */
const STORAGE_KEY = 'cfo-abawd-screening-v1';
const RETENTION_MS = 24 * 60 * 60 * 1000; // 1 day
let sigCanvas = null, sigCtx = null, sigHint = null, sigDrawn = false; // finger/mouse signature pad

function persist(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      view:state.view, step:state.step, gc:state.gc,
      agreed:state.agreed, answers:state.answers, savedAt:Date.now()
    }));
  }catch(e){ /* storage unavailable / full — fail quietly */ }
}

function loadPersisted(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const d = JSON.parse(raw);
    if(!d || typeof d.savedAt !== 'number' || (Date.now() - d.savedAt) > RETENTION_MS){
      localStorage.removeItem(STORAGE_KEY);
      return;
    }
    state.view = d.view || 'intro';
    state.step = typeof d.step === 'number' ? d.step : 0;
    // Clamp in case saved data predates the themed grouping (step used to index questions).
    state.step = Math.max(0, Math.min(state.step, GROUPS.length - 1));
    state.gc = !!d.gc;
    state.agreed = !!d.agreed;
    state.answers = (d.answers && typeof d.answers === 'object') ? d.answers : {};
  }catch(e){
    try{ localStorage.removeItem(STORAGE_KEY); }catch(_){}
  }
}

function deleteAnswers(){
  try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
  state.view = 'intro'; state.step = 0; state.gc = false;
  state.helpOpen = {}; state.answers = {};
  renderWithMotion();
}

function qById(id){ return id === 'goodcause' ? GOODCAUSE : Q_BY_ID[id]; }
function curGroup(){ return GROUPS[state.step]; }
function pageQuestions(){
  if(state.gc) return [GOODCAUSE];
  return curGroup().ids.map(id => Q_BY_ID[id]).filter(q => {
    if(!q || !q.showIf) return !!q;
    return state.answers[q.showIf.id] === q.showIf.val;
  });
}

function setAns(id, val){ state.answers[id] = val; }

/* Homelessness is not an automatic exemption. When someone says they do not
 * have a regular place to sleep, DTA's ABAWD Unable to Work screen asks about
 * diploma, health care, work/school history, and recent hospitalization.
 * Exempt if those answers show a barrier (aligned with that screen + KYR). */
function housingUnableExempt(){
  if(state.answers.housing !== 'no') return false;
  const v = state.answers.housingFollowup;
  if(v == null) return false;
  if(v === NONE) return true;
  const arr = Array.isArray(v) ? v : [];
  if(!arr.length) return false;
  const has = (part) => arr.some(x => x.includes(part));
  const hasDiploma = has('high school diploma');
  const hasJobOrSchool = has('steady job') || has('full-time student');
  const ongoingCare = has('health care provider');
  const hospitalized = has('hospitalized');
  if(hospitalized || ongoingCare) return true;
  if(!hasDiploma || !hasJobOrSchool) return true;
  return false;
}

function reasons(){
  const r = [];
  for(const q of QUESTIONS){
    if(q.id === 'housing' || q.id === 'housingFollowup') continue;
    const v = state.answers[q.id];
    if(q.exemptOn && v === q.exemptOn) r.push(q.reason);
    else if(q.exemptIfAny){
      if(Array.isArray(v)){ if(v.length) r.push(q.reason); }
      else if(v && v !== NONE) r.push(q.reason);
    }
  }
  if(housingUnableExempt()){
    r.push('No regular place to sleep, with other factors that make it hard to work');
  }
  return r;
}

function resultType(){
  if(reasons().length) return 'exempt';
  const g = state.answers.goodcause;
  if(g && g !== NONE) return 'goodcause';
  return 'notexempt';
}

function isAnswered(q){
  const a = state.answers[q.id];
  return Array.isArray(a) ? a.length > 0 : !!a;
}

function advance(){
  if(state.gc){ state.view = 'results'; renderWithMotion(); return; }
  if(state.step < GROUPS.length - 1){ state.step++; renderWithMotion(); return; }
  // finished the themed groups
  if(reasons().length){ state.view = 'results'; }
  else { state.gc = true; }
  renderWithMotion();
}

function back(){
  if(state.gc){ state.gc = false; state.step = GROUPS.length - 1; renderWithMotion(); return; }
  if(state.step > 0){ state.step--; }
  else { state.view = 'intro'; }
  renderWithMotion();
}

function skipToEnd(){
  state.gc = false;
  state.view = 'results';
  renderWithMotion();
}

/* ------------------------------------------------------------------ *
 * Rendering
 * ------------------------------------------------------------------ */

function esc(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

const primaryBtn = "font-size:17px;font-weight:700;color:#fff;background:var(--accent);border:none;border-radius:var(--radius);padding:15px 26px;cursor:pointer;box-shadow:0 2px 0 var(--accent-dark);min-height:48px";
const nextBtn    = "font-size:16px;font-weight:700;color:#fff;background:var(--accent);border:none;border-radius:var(--radius);padding:12px 22px;cursor:pointer;box-shadow:0 2px 0 var(--accent-dark);min-height:48px";
const ghostBtn   = "font-size:15px;font-weight:700;color:var(--accent);background:none;border:2px solid var(--accent);border-radius:var(--radius);padding:10px 18px;cursor:pointer;min-height:48px";
const inputStyle = "width:100%;font-family:inherit;font-size:16px;padding:12px;border:1.5px solid #cdd3dc;border-radius:calc(var(--radius) - 3px);min-height:48px";

// Returns an array of option descriptors for the current question.
function buildOptions(q){
  const a = state.answers[q.id];
  const out = [];
  if(q.type === 'yn'){
    out.push({label:'Yes', selected:a === 'yes', mark:a === 'yes' ? '●' : '', shape:'round', kind:'yn', val:'yes'});
    out.push({label:'No',  selected:a === 'no',  mark:a === 'no'  ? '●' : '', shape:'round', kind:'yn', val:'no'});
  } else if(q.type === 'multi'){
    const arr = Array.isArray(a) ? a : [];
    q.options.forEach((o, i) => out.push({label:o, selected:arr.includes(o), mark:arr.includes(o) ? '✓' : '', shape:'square', kind:'multi', idx:i}));
    out.push({label:q.noneLabel, selected:a === NONE, mark:a === NONE ? '✓' : '', shape:'square', kind:'multi-none'});
  } else if(q.type === 'single'){
    q.options.forEach((o, i) => out.push({label:o, selected:a === o, mark:a === o ? '●' : '', shape:'round', kind:'single', idx:i}));
    out.push({label:q.noneLabel, selected:a === NONE, mark:a === NONE ? '●' : '', shape:'round', kind:'single-none'});
  }
  return out;
}

function renderProgress(){
  const el = document.getElementById('progress');
  if(state.view !== 'question'){ el.innerHTML = ''; return; }
  const total = GROUPS.length;
  let pct, label;
  if(state.gc){ pct = 100; label = 'Last question'; }
  else { const cur = state.step + 1; pct = Math.round((cur / total) * 100); label = `Section ${cur} of ${total}`; }
  el.innerHTML =
    `<div style="height:6px;background:var(--soft)" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="${pct}" aria-label="Screening progress">`
    + `<div style="height:100%;width:${pct}%;background:var(--accent);transition:width .3s ease"></div></div>`
    + `<div style="max-width:660px;margin:0 auto;padding:10px max(16px, env(safe-area-inset-right)) 0 max(16px, env(safe-area-inset-left));font-size:13px;color:#5b6470;font-weight:700">${label}</div>`;
}

function animClass(){ return state.animate ? 'card-in' : ''; }

function renderIntro(){
  return `<div class="${animClass()}">
    <h1 class="h1">Did DTA tell you that you need to meet ABAWD Work Rules to keep getting SNAP?</h1>
    <p style="font-size:16.5px;line-height:1.6;color:#3a424e;margin:0 0 14px">Some adults on SNAP ages 18 through 64 have to meet ABAWD work rules to get SNAP for more than 3 months. <strong>Many adults are exempt</strong> — meaning you don't have to meet the work rules to keep getting SNAP.</p>
    <p style="font-size:16.5px;line-height:1.6;color:#3a424e;margin:0 0 22px">This short screening asks a few questions to check whether the work rules apply to you, or whether you're exempt or already meeting them. It takes about 3 minutes.</p>
    <div style="display:flex;align-items:flex-start;gap:12px;background:var(--soft);border-radius:var(--radius);padding:15px 17px;margin-bottom:22px">
      <div style="font-size:18px;line-height:1.4;flex:none" aria-hidden="true">\u{1F512}</div>
      <p style="font-size:14.5px;line-height:1.55;color:#3a424e;margin:0">Your answers stay in your browser and are never sent to us. They are automatically cleared after 1 day, and you can delete them yourself at any time.</p>
    </div>

    <details style="margin:0 0 16px;border:1px solid #dfe3ea;border-radius:var(--radius);background:#fff">
      <summary style="cursor:pointer;padding:13px 16px;font-size:15px;font-weight:700;color:var(--accent)">Terms of Use</summary>
      <div style="padding:0 16px 15px;font-size:14px;line-height:1.6;color:#3a424e">
        <p style="margin:0 0 10px">This screening tool provides general information only. It is <strong>not legal advice</strong> and does not create an attorney–client relationship. Results are based only on the answers you provide and may not reflect your full situation.</p>
        <p style="margin:0 0 10px">For advice about your specific case, contact a legal aid program or an attorney, and always confirm requirements with DTA before acting.</p>
        <p style="margin:0">Your answers are stored only in this browser, are never transmitted to us, and are cleared automatically after 1 day.</p>
      </div>
    </details>

    <label style="display:flex;gap:11px;align-items:flex-start;margin:0 0 22px;font-size:15px;line-height:1.5;color:#3a424e;cursor:pointer">
      <input type="checkbox" id="agree" ${state.agreed ? 'checked' : ''} style="width:20px;height:20px;flex:none;margin-top:1px;accent-color:var(--accent);cursor:pointer">
      <span>I have read and agree to the Terms of Use above.</span>
    </label>

    <button type="button" id="start-btn" data-action="start" ${state.agreed ? '' : 'aria-disabled="true"'} style="${primaryBtn}${state.agreed ? '' : ';opacity:.5;cursor:not-allowed'}">Start the screening →</button>
    <p style="font-size:14px;margin:18px 0 0"><a href="#">Learn more about the SNAP ABAWD work rules</a></p>
  </div>`;
}

// Help disclosure for one question.
function renderHelp(q){
  if(!q.help) return '';
  const open = !!state.helpOpen[q.id];
  let help = `<div style="margin:14px 0 0">
    <button type="button" data-action="toggle-help" data-q-id="${q.id}" aria-expanded="${open}" style="display:inline-flex;align-items:center;gap:7px;font-size:14px;font-weight:700;color:var(--accent);background:none;border:none;padding:0;cursor:pointer">
      <span aria-hidden="true" style="width:18px;height:18px;border-radius:50%;border:2px solid var(--accent);display:inline-flex;align-items:center;justify-content:center;font-size:12px;flex:none">i</span>
      ${open ? 'Hide help' : 'What does this mean?'}
    </button>`;
  if(open){
    help += `<p style="font-size:15px;line-height:1.6;color:#3a424e;margin:10px 0 0;padding:13px 15px;background:var(--soft);border-radius:var(--radius);border-left:4px solid var(--accent)">${esc(q.help)}</p>`;
  }
  help += `</div>`;
  return help;
}

// Option buttons for one question.
function renderOptions(q){
  const groupRole = q.type === 'multi' ? 'group' : 'radiogroup';
  const buttons = buildOptions(q).map(o => {
    const dataset = o.kind === 'yn' ? `data-opt-kind="yn" data-opt-val="${o.val}"`
      : (o.kind === 'multi' || o.kind === 'single') ? `data-opt-kind="${o.kind}" data-opt-idx="${o.idx}"`
      : `data-opt-kind="${o.kind}"`;
    const role = q.type === 'multi' ? 'checkbox' : 'radio';
    const markClass = o.shape === 'square' ? 'opt-mark square' : 'opt-mark';
    return `<button type="button" class="opt${o.selected ? ' opt-selected' : ''}" data-q-id="${q.id}" ${dataset} role="${role}" aria-checked="${o.selected}">

      <span style="flex:1;text-align:left">${esc(o.label)}</span>
    </button>`;
  }).join('');
  return `<div role="${groupRole}" aria-label="${esc(q.text)}" style="display:flex;flex-direction:column;gap:11px;margin:20px 0 0">${buttons}</div>`;
}

/* ---- Finger / mouse signature pad (canvas) ----
 * Drawn locally and never saved or uploaded. Prints as a real image, so
 * DTA gets a genuine handwritten mark rather than a typed cursive font. */
function initSignaturePad(){
  const canvas = document.getElementById('sig-pad');
  if(!canvas){ sigCanvas = sigCtx = sigHint = null; return; }
  sigCanvas = canvas;
  sigHint = document.getElementById('sig-hint');
  sigDrawn = false;

  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth || 300;
  const h = canvas.clientHeight || 140;
  canvas.width = Math.round(w * dpr);
  canvas.height = Math.round(h * dpr);
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.lineWidth = 2.2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.strokeStyle = '#1b1f27'; ctx.fillStyle = '#1b1f27';
  sigCtx = ctx;

  let drawing = false, lastX = 0, lastY = 0;
  const at = (e) => { const r = canvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; };
  const start = (e) => {
    drawing = true;
    const p = at(e); lastX = p.x; lastY = p.y;
    if(!sigDrawn){ sigDrawn = true; if(sigHint) sigHint.style.display = 'none'; }
    ctx.beginPath(); ctx.arc(lastX, lastY, ctx.lineWidth / 2, 0, Math.PI * 2); ctx.fill();
    if(canvas.setPointerCapture && e.pointerId != null){ try{ canvas.setPointerCapture(e.pointerId); }catch(_){} }
    e.preventDefault();
  };
  const move = (e) => {
    if(!drawing) return;
    const p = at(e);
    ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y); ctx.stroke();
    lastX = p.x; lastY = p.y;
    e.preventDefault();
  };
  const end = () => { drawing = false; };
  canvas.addEventListener('pointerdown', start);
  canvas.addEventListener('pointermove', move);
  canvas.addEventListener('pointerup', end);
  canvas.addEventListener('pointerleave', end);
  canvas.addEventListener('pointercancel', end);
}

function clearSignature(){
  if(!sigCtx || !sigCanvas) return;
  const dpr = window.devicePixelRatio || 1;
  sigCtx.clearRect(0, 0, sigCanvas.width / dpr, sigCanvas.height / dpr);
  sigDrawn = false;
  if(sigHint) sigHint.style.display = '';
}

/* Export signature as a white-backed PNG so print/PDF keeps the ink. */
function captureSignatureDataURL(){
  if(!sigDrawn || !sigCanvas) return '';
  try{
    const out = document.createElement('canvas');
    out.width = sigCanvas.width;
    out.height = sigCanvas.height;
    const ctx = out.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, out.width, out.height);
    ctx.drawImage(sigCanvas, 0, 0);
    return out.toDataURL('image/png');
  }catch(_){ return ''; }
}

/* ---- Printable / downloadable "Statement to DTA" form ----
 * Builds a clean, standalone document from the person's answers,

  }

  const explainBlock = `<div style="margin:0 0 18px">
      <div style="font-weight:700;margin:0 0 5px">In my own words:</div>
      <div style="border:1px solid #000;padding:10px;min-height:64px;white-space:pre-wrap">${esc(explain)}</div>
    </div>`;

  const sigBlock = `<div style="margin:28px 0 0">
      <div style="font-weight:700;margin:0 0 6px">Signature</div>
      ${sigImg
        ? `<img src="${sigImg}" alt="Signature" width="420" height="80" style="display:block;width:420px;height:80px;max-width:100%;border-bottom:1px solid #000">`
        : `<div style="border-bottom:1px solid #000;height:60px"></div>`}
      <div style="display:flex;justify-content:space-between;gap:16px;margin:6px 0 0;font-size:13px">

  return `<div style="font-family:Georgia,serif;color:#000;max-width:640px;margin:0 auto;padding:24px;font-size:15px;line-height:1.55">
    <div style="text-align:center;border-bottom:2px solid #000;padding-bottom:12px;margin-bottom:20px">
      <div style="font-size:13px;letter-spacing:.05em;text-transform:uppercase">Massachusetts Department of Transitional Assistance</div>
      <div style="font-size:21px;font-weight:700;margin-top:4px">SNAP Work Rules Statement</div>
      <div style="font-size:12px;margin-top:5px;color:#555">SAMPLE - draft for review</div>
    </div>
    ${field('Name', name)}
    ${field('Agency ID (if you have one)', agency)}
    ${field('Date', today)}

}

function buildPrintRoot(){
  let root = document.getElementById('print-root');
  if(!root){ root = document.createElement('div'); root.id = 'print-root'; document.body.appendChild(root); }
  root.innerHTML = statementInnerHTML();
}

function printForm(){
  buildPrintRoot();
  const cleanup = () => document.body.classList.remove('printing-form');
  window.addEventListener('afterprint', cleanup, { once:true });
  document.body.classList.add('printing-form');
  // Wait a frame so the signature <img> can decode before the print snapshot.
  // Do not clear printing-form on a short timer — Chrome returns from print()
  // immediately, and a 2s cleanup was wiping the form mid Save-as-PDF.
  requestAnimationFrame(() => {
    requestAnimationFrame(() => { window.print(); });
  });
}

function downloadDoc(){
  // Word ignores data: URLs in HTML .doc files. Package as MHTML so the
  // signature PNG is a real related image part Word can display.
  const dataUrl = captureSignatureDataURL();
  const boundary = '----=_NextPart_CFO_SNAP_STMT';
  const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="utf-8"><title>SNAP Work Rules Statement</title>
<!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View><w:Zoom>100</w:Zoom></w:WordDocument></xml><![endif]-->
</head>
<body>${statementInnerHTML(dataUrl ? 'signature.png' : '')}</body>
</html>`;

  const wrap76 = (s) => (s.match(/.{1,76}/g) || []).join('\r\n');
  const htmlB64 = wrap76(btoa(unescape(encodeURIComponent(html))));

  const parts = [
    'MIME-Version: 1.0',
    'Content-Type: multipart/related; boundary="' + boundary + '"',
    '',
    '--' + boundary,
    'Content-Type: text/html; charset="utf-8"',
    'Content-Transfer-Encoding: base64',
    'Content-Location: statement.htm',
    '',
    htmlB64
  ];
  if(dataUrl){
    const pngB64 = dataUrl.replace(/^data:image\/png;base64,/, '');
    parts.push(
      '--' + boundary,
      'Content-Type: image/png',
      'Content-Transfer-Encoding: base64',
      'Content-Location: signature.png',
      '',
      wrap76(pngB64)
    );
  }
  parts.push('--' + boundary + '--', '');

  const blob = new Blob([parts.join('\r\n')], { type: 'application/msword' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'SNAP-Work-Rules-Statement.doc';
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

function render(){
  renderProgress();
  const stage = document.getElementById('stage');
  if(state.view === 'intro') stage.innerHTML = renderIntro();
  else if(state.view === 'question') stage.innerHTML = renderPage();
  else stage.innerHTML = renderResults();

  // Move focus to the new stage heading for screen-reader users.
  const heading = stage.querySelector('h1, h2');
  if(heading){ heading.setAttribute('tabindex', '-1'); }

  state.animate = false;
  initSignaturePad();
  persist();
}

function renderWithMotion(){
  state.animate = true;
  render();
}

document.addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if(!btn) return;

  // Option buttons within a question
  const kind = btn.getAttribute('data-opt-kind');
  if(kind){
    const q = qById(btn.getAttribute('data-q-id'));
    if(!q) return;
    // Selecting an answer no longer moves you forward — use Next when ready.
    if(kind === 'yn'){
      setAns(q.id, btn.getAttribute('data-opt-val'));
      if(q.id === 'housing' && btn.getAttribute('data-opt-val') !== 'no'){
        delete state.answers.housingFollowup;
      }
      render();
    } else if(kind === 'multi'){
      const o = q.options[+btn.getAttribute('data-opt-idx')];
      const cur = Array.isArray(state.answers[q.id]) ? state.answers[q.id] : [];
      state.answers[q.id] = cur.includes(o) ? cur.filter(x => x !== o) : [...cur, o];
      render();
    } else if(kind === 'multi-none'){
      setAns(q.id, NONE);
      render();
    } else if(kind === 'single'){
      setAns(q.id, q.options[+btn.getAttribute('data-opt-idx')]);
      render();
    } else if(kind === 'single-none'){
      setAns(q.id, NONE);
      render();
    }
    return;
  }

  const action = btn.getAttribute('data-action');
  if(!action) return;
  switch(action){
    case 'start':
      if(!state.agreed) return; // gated on Terms of Use acceptance
      state.view = 'question'; state.step = 0; state.gc = false; state.helpOpen = {}; renderWithMotion(); break;
    case 'back': back(); break;
    case 'next': advance(); break;
    case 'skip-end': skipToEnd(); break;
    case 'toggle-help': { const id = btn.getAttribute('data-q-id'); if(id){ state.helpOpen[id] = !state.helpOpen[id]; render(); } break; }
    case 'restart':
      state.view = 'intro'; state.step = 0; state.gc = false; state.helpOpen = {}; state.answers = {}; renderWithMotion(); break;
    case 'delete-answers': deleteAnswers(); break;
    case 'quick-exit': window.location.replace('snap-screening.html'); break;
    case 'print': printForm(); break;
    case 'download-doc': downloadDoc(); break;
    case 'sig-clear': clearSignature(); break;
  }
});

// Terms of Use consent toggle — enable/disable Start without a full re-render
// so the checkbox keeps focus.
document.addEventListener('change', (e) => {
  if(e.target && e.target.id === 'agree'){
    state.agreed = e.target.checked;
    persist();
    const btn = document.getElementById('start-btn');
    if(btn){
      if(state.agreed){
        btn.style.opacity = ''; btn.style.cursor = 'pointer'; btn.removeAttribute('aria-disabled');
      } else {
        btn.style.opacity = '.5'; btn.style.cursor = 'not-allowed'; btn.setAttribute('aria-disabled', 'true');
      }
    }
  }
});

loadPersisted();
state.animate = true;
render();
</script>
</body>
</html>

<style>
  :root{
    --navy:#0a2b52;

    --soft:#eaf1fb;

    --red:#b23b2e;
    --red-bg:#fbeeeb;
    --red-bd:#edd3cf;
    --amber-bg:#fff8e8;
    --amber-bd:#f0dca6;
    --amber-ink:#5c4a1f;
    --bg:#eef1f6;
    --ink:#16202e;
    --muted:#5b6675;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
  html,body{margin:0}
  body{
    font-family:'Atkinson Hyperlegible',system-ui,-apple-system,sans-serif;
    color:var(--ink);background:var(--bg);min-height:100vh;overflow-x:hidden;
  }
  a{color:var(--blue);text-decoration:underline;text-underline-offset:3px}
  a:hover{color:var(--navy)}
  button{font-family:inherit}
  :focus-visible{outline:3px solid var(--navy);outline-offset:2px;border-radius:6px}
  @keyframes fadeUp{from{opacity:0}to{opacity:1}}
  .fade{animation:fadeUp .35s ease both}
  .opt{
    font-family:inherit;font-weight:700;cursor:pointer;color:var(--ink);
    background:#fff;border:2.5px solid #d3d9e2;
    box-shadow:0 0 0 4px transparent;
    transition:background .15s ease,border-color .15s ease,box-shadow .15s ease;
    -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  }
  .opt:hover{border-color:#a8b4c8;background:#f7f9fc}
  .opt:active{background:var(--soft)}
  .opt-selected{
    border-color:var(--blue);background:var(--soft);
    box-shadow:inset 0 0 0 1px var(--blue),0 0 0 4px rgba(19,74,142,.16);
  }
  .opt-selected:hover{border-color:var(--blue);background:var(--soft)}
  .opt-yn{
    flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:8px;

  .opt-row{

  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

    .card-box{padding:22px 18px;border-radius:16px}
    .facts-grid{grid-template-columns:1fr;gap:10px;margin-bottom:20px}
    .fact-cell{padding:14px 16px}

    .result-body{padding:18px}
    .q-nav{margin-top:18px}

    .yn-group{flex-direction:column}
    .opt-yn{width:100%}

    .fade{animation:none}
    .opt,.opt-mark{transition:none}

  .hint-tip{position:relative;display:inline-block;max-width:100%}
  .hint-tip-btn{
    display:inline-flex;align-items:center;gap:7px;font-family:inherit;font-size:13.5px;font-weight:700;
    color:var(--muted);background:none;border:none;padding:8px 4px;cursor:help;min-height:44px;
    text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px;
  }
  .hint-tip-icon{
    width:18px;height:18px;border-radius:50%;border:1.5px solid var(--blue);color:var(--blue);
    display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex:none;
  }
  .hint-tip-panel{
    z-index:100;padding:12px 14px;font-size:13.5px;line-height:1.5;font-weight:400;
    color:var(--ink);background:#fff;border:1px solid #cdd3dc;border-radius:12px;
    box-shadow:0 8px 24px rgba(16,32,56,.12);text-align:left;overflow-wrap:anywhere;
    opacity:0;visibility:hidden;pointer-events:none;
    transition:opacity .15s ease,visibility .15s ease,max-height .2s ease,padding .2s ease,margin .2s ease;
  }
  .hint-tip--icon{display:inline-flex;vertical-align:middle;width:auto}
  .hint-tip-btn--icon{min-height:28px;padding:2px;text-decoration:none;gap:0}
  .hint-tip-btn--icon .hint-tip-icon{width:20px;height:20px;font-size:13px}
  .hint-tip-wrap{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  @media (max-width:640px),(hover:none),(pointer:coarse){
    .hint-tip:not(.hint-tip--icon){display:block;width:100%;max-width:100%}
    .hint-tip-wrap .hint-tip--icon.is-open{
      flex:1 1 100%;display:flex;flex-direction:column;align-items:stretch;
      max-width:100%;min-width:0;
    }
    .hint-tip-wrap .hint-tip--icon.is-open .hint-tip-btn{align-self:flex-start}
    .hint-tip-btn--icon{min-height:44px;min-width:44px;justify-content:center}
    .hint-tip-panel{
      display:block;position:static;width:100%;max-width:100%;box-sizing:border-box;box-shadow:none;
      max-height:0;overflow:hidden;padding:0 14px;margin:0;opacity:1;
    }
    .hint-tip.is-open .hint-tip-panel{
      visibility:visible;pointer-events:auto;max-height:400px;overflow:visible;
      padding:12px 14px;margin-top:8px;
    }
  }
  @media (hover:hover) and (min-width:641px) and (pointer:fine){
    .hint-tip-btn{min-height:auto;padding:4px 2px}
    .hint-tip-panel{position:fixed;width:min(300px,calc(100vw - 32px))}
    .hint-tip:hover .hint-tip-panel,.hint-tip:focus-within .hint-tip-panel,.hint-tip.is-open .hint-tip-panel{
      opacity:1;visibility:visible;pointer-events:auto;
    }
  }
  /* Off-screen (not display:none) so the signature image can decode before print. */
  #print-root{position:fixed;left:-10000px;top:0;width:8.5in;pointer-events:none}
  @media print{
    @page{margin:0}
    .no-print{display:none !important}

    body.printing-form > *{display:none !important}

      width:auto !important;pointer-events:auto;padding:0.6in;
    }
    #print-root img{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }

<!-- ===== TOP NAV ===== -->
<div class="no-print" style="background:var(--navy);color:#fff">
  <div class="topbar-inner">
    <div class="brand">
      <div style="width:26px;height:34px;border-radius:5px 5px 3px 3px;background:linear-gradient(var(--yellow),#e79a1f);position:relative;flex:none">
        <div style="position:absolute;left:50%;top:6px;transform:translateX(-50%);width:4px;height:20px;background:var(--navy);border-radius:2px"></div>
      </div>
      <div class="brand-text">

      </div>
    </div>

<script src="snap-screening-logic.js"></script>
<script>
"use strict";

const S = SnapScreening.create('v2');
const {
  QUESTIONS, GOODCAUSE, GC_TEXT, GROUPS, Q_BY_ID, NONE,
  SCREENING_HUB_URL, WORK_REASON_INCOME, WORK_REASON_HOURS_30,
  DISABILITY_OTHER_REASON, HOUSING_EXEMPT_REASON
} = S;

/* ------------------------------------------------------------------ *
 * State + logic
 * ------------------------------------------------------------------ */

const state = { view:'intro', step:0, gc:false, helpOpen:{}, agreed:false, answers:{}, animate:true };

const STORAGE_KEY = 'cfo-abawd-screening-v2';
const RETENTION_MS = 24 * 60 * 60 * 1000; // 1 day
const MLH_ABAWD_URL = 'https://www.masslegalhelp.org/public-benefits-ssi/snap-food-benefits/snap-3-month-time-limit-abawd-work-rules';
let SAMPLE_MODE = false; // true when showing a ?sample= preview result
let sigCanvas = null, sigCtx = null, sigHint = null, sigDrawn = false; // finger/mouse signature pad

function persist(){
  if(SAMPLE_MODE) return; // a sample preview must never overwrite a real saved session
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      view:state.view, step:state.step, gc:state.gc,
      agreed:state.agreed, answers:state.answers, savedAt:Date.now()
    }));
  }catch(e){ /* storage unavailable / full — fail quietly */ }
}

function loadPersisted(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const d = JSON.parse(raw);
    if(!d || typeof d.savedAt !== 'number' || (Date.now() - d.savedAt) > RETENTION_MS){
      localStorage.removeItem(STORAGE_KEY);
      return;
    }
    state.view = d.view || 'intro';
    state.step = typeof d.step === 'number' ? d.step : 0;
    // Clamp in case saved data predates the themed grouping (step used to index questions).
    state.step = Math.max(0, Math.min(state.step, GROUPS.length - 1));
    state.gc = !!d.gc;
    state.agreed = !!d.agreed;
    state.answers = (d.answers && typeof d.answers === 'object') ? S.migrateAnswers(d.answers) : {};
  }catch(e){
    try{ localStorage.removeItem(STORAGE_KEY); }catch(_){}
  }
}

function deleteAnswers(){
  try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
  SAMPLE_MODE = false; // leaving any sample preview back into a real (savable) session
  state.view = 'intro'; state.step = 0; state.gc = false;
  state.helpOpen = {}; state.answers = {};
  renderWithMotion();
}

function qById(id){ return S.qById(id); }
function curGroup(){ return GROUPS[state.step]; }
function pageQuestions(){ return S.pageQuestions(state.answers, state.step, state.gc); }
function setAns(id, val){ state.answers[id] = val; }
function reasons(){ return S.exemptReasons(state.answers); }
function resultType(){ return S.resultType(state.answers); }

function advance(){
  if(state.gc){ state.view = 'results'; renderWithMotion(); return; }
  if(state.step < GROUPS.length - 1){ state.step++; renderWithMotion(); return; }
  if(S.shouldSkipGoodCause(state.answers)){ state.view = 'results'; }
  else { state.gc = true; }
  renderWithMotion();
}

function back(){
  if(state.gc){ state.gc = false; state.step = GROUPS.length - 1; renderWithMotion(); return; }
  if(state.step > 0){ state.step--; }
  else { state.view = 'intro'; }
  renderWithMotion();
}

function skipToEnd(){
  if(S.shouldSkipGoodCause(state.answers)){
    state.gc = false;
    state.view = 'results';
  } else {
    state.gc = true;
    state.view = 'question';
  }
  renderWithMotion();
}

/* ------------------------------------------------------------------ *
 * Rendering
 * ------------------------------------------------------------------ */

function esc(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function hintTip(id, label, bodyHtml, iconOnly){
  const tipClass = iconOnly ? 'hint-tip hint-tip--icon' : 'hint-tip';
  const btnClass = iconOnly ? 'hint-tip-btn hint-tip-btn--icon' : 'hint-tip-btn';
  const btnInner = iconOnly
    ? `<span class="hint-tip-icon" aria-hidden="true">i</span>`
    : `<span class="hint-tip-icon" aria-hidden="true">i</span><span>${esc(label)}</span>`;
  const ariaLabel = iconOnly ? ` aria-label="${esc(label)}"` : '';
  return `<span class="${tipClass}">
    <button type="button" class="${btnClass}" aria-expanded="false" aria-controls="hint-${id}"${ariaLabel} data-action="toggle-hint" data-hint-id="${id}">
      ${btnInner}
    </button>
    <span id="hint-${id}" class="hint-tip-panel" role="note">${bodyHtml}</span>
  </span>`;
}

function hintTipUsesInlinePanel(){
  return window.matchMedia('(max-width: 640px), (hover: none), (pointer: coarse)').matches;
}

function hintTipUsesFloatingPanel(){
  return window.matchMedia('(hover: hover) and (min-width: 641px) and (pointer: fine)').matches;
}

function clearHintPanelPosition(panel){
  panel.style.top = panel.style.left = panel.style.width = panel.style.display = panel.style.visibility = '';
}

function setHintTipOpen(tip, open){
  const btn = tip.querySelector('.hint-tip-btn');
  const panel = tip.querySelector('.hint-tip-panel');
  if(open){
    if(panel && hintTipUsesInlinePanel()) clearHintPanelPosition(panel);
    if(hintTipUsesFloatingPanel()) positionHintPanel(tip);
    tip.classList.add('is-open');
    if(btn) btn.setAttribute('aria-expanded', 'true');
  } else {
    tip.classList.remove('is-open');
    if(btn) btn.setAttribute('aria-expanded', 'false');
    if(panel) clearHintPanelPosition(panel);
  }
}

function positionHintPanel(tip){
  if(hintTipUsesInlinePanel()) return;
  const btn = tip.querySelector('.hint-tip-btn');
  const panel = tip.querySelector('.hint-tip-panel');
  if(!btn || !panel) return;

  const pad = 16;
  const gap = 10;
  const maxW = Math.min(300, window.innerWidth - pad * 2);
  const rect = btn.getBoundingClientRect();

  panel.style.width = maxW + 'px';
  panel.style.left = '-9999px';
  panel.style.top = '-9999px';
  panel.style.visibility = 'hidden';
  panel.style.display = 'block';

  const panelH = panel.offsetHeight;
  let left = rect.left + (rect.width - maxW) / 2;
  left = Math.max(pad, Math.min(left, window.innerWidth - maxW - pad));

  let top = rect.bottom + gap;
  if(top + panelH > window.innerHeight - pad) top = rect.top - panelH - gap;
  if(top < pad) top = Math.max(pad, window.innerHeight - panelH - pad);

  panel.style.left = left + 'px';
  panel.style.top = top + 'px';
  panel.style.visibility = '';
}

function repositionVisibleHintPanels(){
  document.querySelectorAll('.hint-tip-panel').forEach(panel => {
    if(hintTipUsesInlinePanel()) clearHintPanelPosition(panel);
  });
  document.querySelectorAll('.hint-tip.is-open').forEach(positionHintPanel);
  if(hintTipUsesFloatingPanel()){
    document.querySelectorAll('.hint-tip:hover').forEach(positionHintPanel);
  }
}

function initHintTips(){
  document.addEventListener('mouseover', (e) => {
    if(!hintTipUsesFloatingPanel()) return;
    const tip = e.target.closest && e.target.closest('.hint-tip');
    if(!tip) return;
    if(e.relatedTarget && tip.contains(e.relatedTarget)) return;
    positionHintPanel(tip);
  });

  document.addEventListener('focusin', (e) => {
    const tip = e.target.closest && e.target.closest('.hint-tip');
    if(tip && hintTipUsesFloatingPanel()) positionHintPanel(tip);
  });

  window.addEventListener('resize', repositionVisibleHintPanels, { passive: true });
  window.addEventListener('scroll', repositionVisibleHintPanels, { passive: true, capture: true });

  document.addEventListener('click', (e) => {
    if(e.target.closest && e.target.closest('[data-action="toggle-hint"]')) return;
    document.querySelectorAll('.hint-tip.is-open').forEach(t => setHintTipOpen(t, false));
  });
}

const primaryBtn = "font-family:inherit;font-size:20px;font-weight:700;color:#fff;background:var(--blue);border:none;border-radius:12px;padding:17px 34px;cursor:pointer;box-shadow:0 2px 0 var(--navy);min-height:52px;touch-action:manipulation";
const nextBtn    = "font-family:inherit;font-size:18px;font-weight:700;color:#fff;background:var(--blue);border:none;border-radius:12px;padding:14px 28px;cursor:pointer;box-shadow:0 2px 0 var(--navy);min-height:48px;touch-action:manipulation";
const ghostBtn   = "font-family:inherit;font-size:16px;font-weight:700;color:var(--blue);background:none;border:2px solid var(--blue);border-radius:12px;padding:12px 22px;cursor:pointer;min-height:48px;touch-action:manipulation";
const inputStyle = "width:100%;font-family:inherit;font-size:16px;padding:12px 14px;border:1.5px solid #cdd3dc;border-radius:10px;min-height:48px";

/* ---- Question option buttons ---- */

// Big Yes / No pair.
function ynButtons(q){
  const a = state.answers[q.id];
  const one = (val, label, lucideName) => {
    const sel = a === val;
    return `<button type="button" class="opt opt-yn${sel ? ' opt-selected' : ''}" role="radio" aria-checked="${sel}" data-q-id="${q.id}" data-opt-kind="yn" data-opt-val="${val}">
      <i data-lucide="${lucideName}" aria-hidden="true"></i>
      <span>${label}</span>
    </button>`;
  };
  return `<div role="radiogroup" aria-label="${esc(q.text)}" class="yn-group">
    ${one('yes','Yes','check')}
    ${one('no','No','x')}
  </div>`;
}

// Multi / single choice list with big rows.
function choiceButtons(q){
  const a = state.answers[q.id];
  const rows = [];

  if(q.type === 'multi'){
    const arr = Array.isArray(a) ? a : [];
    q.options.forEach((o, i) => {
      const sel = arr.includes(o.id);
      rows.push(`<button type="button" class="opt opt-row${sel ? ' opt-selected' : ''}" role="checkbox" aria-checked="${sel}" data-q-id="${q.id}" data-opt-kind="multi" data-opt-idx="${i}">
        <span aria-hidden="true" class="opt-mark square">${sel ? '✓' : ''}</span>
        <span style="flex:1">${esc(o.label)}</span>
      </button>`);
    });
    const selNone = a === NONE;
    rows.push(`<button type="button" class="opt opt-row${selNone ? ' opt-selected' : ''}" role="checkbox" aria-checked="${selNone}" data-q-id="${q.id}" data-opt-kind="multi-none">
      <span aria-hidden="true" class="opt-mark square">${selNone ? '✓' : ''}</span>
      <span style="flex:1">${esc(q.noneLabel)}</span>
    </button>`);
  } else { // single
    q.options.forEach((o, i) => {
      const sel = a === o.id;
      rows.push(`<button type="button" class="opt opt-row${sel ? ' opt-selected' : ''}" role="radio" aria-checked="${sel}" data-q-id="${q.id}" data-opt-kind="single" data-opt-idx="${i}">
        <span aria-hidden="true" class="opt-mark">${sel ? '●' : ''}</span>
        <span style="flex:1">${esc(o.label)}</span>
      </button>`);
    });
    const selNone = a === NONE;
    rows.push(`<button type="button" class="opt opt-row${selNone ? ' opt-selected' : ''}" role="radio" aria-checked="${selNone}" data-q-id="${q.id}" data-opt-kind="single-none">
      <span aria-hidden="true" class="opt-mark">${selNone ? '●' : ''}</span>
      <span style="flex:1">${esc(q.noneLabel)}</span>
    </button>`);
  }
  const groupRole = q.type === 'multi' ? 'group' : 'radiogroup';
  return `<div role="${groupRole}" aria-label="${esc(q.text)}" style="display:flex;flex-direction:column;gap:12px;margin:24px 0 0">${rows.join('')}</div>`;
}

function renderProgress(){
  const el = document.getElementById('progress');
  if(state.view !== 'question'){ el.innerHTML = ''; return; }
  const total = GROUPS.length;
  let pct, label;
  if(state.gc){ pct = 100; label = 'Last question'; }
  else { const cur = state.step + 1; pct = Math.round((cur / total) * 100); label = `Section ${cur} of ${total}`; }
  el.innerHTML =
    `<div style="height:10px;background:#dbe3ef" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="${pct}" aria-label="How far you are">`
    + `<div style="height:100%;width:${pct}%;background:var(--blue);transition:width .3s ease"></div></div>`
    + `<div style="max-width:760px;margin:0 auto;padding:12px max(16px, env(safe-area-inset-right)) 0 max(16px, env(safe-area-inset-left));font-size:15px;color:var(--muted);font-weight:700">${label}</div>`;
}

function animClass(){ return state.animate ? 'fade' : ''; }

function canStart(){ return state.agreed && (state.answers.ageRange === 'yes' || state.answers.ageRange === 'no'); }

// Help disclosure for one question.
function renderHelp(q){
  if(!q.help) return '';
  const open = !!state.helpOpen[q.id];
  let help = `<div style="margin:16px 0 0">
    <button type="button" data-action="toggle-help" data-q-id="${q.id}" aria-expanded="${open}" style="display:inline-flex;align-items:center;gap:8px;font-size:16px;font-weight:700;color:var(--blue);background:none;border:none;padding:0;cursor:pointer">
      <span aria-hidden="true" style="width:22px;height:22px;border-radius:50%;border:2px solid var(--blue);display:inline-flex;align-items:center;justify-content:center;font-size:14px;flex:none">i</span>
      ${open ? 'Hide help' : 'What does this mean?'}
    </button>`;
  if(open){
    help += `<p style="font-size:16.5px;line-height:1.6;color:#2c3644;margin:12px 0 0;padding:15px 17px;background:var(--soft);border-radius:14px;border-left:5px solid var(--blue)">${esc(q.help)}</p>`;
  }
  help += `</div>`;
  return help;
}

// One question, as its own card.
function renderQBlock(q){
  const isGC = q.id === 'goodcause';
  const options = q.type !== 'yn' ? choiceButtons(q) : ynButtons(q);
  const head = isGC
    ? `<h2 class="h-q">${esc(q.text)}</h2>`
    : `<h3 style="font-size:clamp(19px,4.6vw,22px);line-height:1.3;margin:0;letter-spacing:-.01em">${esc(q.text)}</h3>`;
  return `<div class="card-box">
    ${head}
    ${renderHelp(q)}
    ${options}
  </div>`;
}

function renderPage(){
  const lastGroup = !state.gc && state.step === GROUPS.length - 1;
  const nextLabel = (lastGroup || state.gc) ? 'See my answer →' : 'Next →';
  const skipWarn = lastGroup && !state.gc && reasons().length === 0
    ? `<p style="font-size:15px;line-height:1.55;color:#7a4a00;margin:16px 0 0;padding:14px 16px;background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:14px">If you skipped questions, you may not see exemptions that apply to you.</p>`
    : '';

  const header = state.gc ? '' : `<div style="margin:0 0 18px">
    <h2 class="h-q">${esc(curGroup().title)}</h2>
    <p class="lead" style="margin:8px 0 0">Answer any that apply to you — every question is optional.</p>
  </div>`;

  const blocks = pageQuestions().map(renderQBlock).join('');

  return `<div class="${animClass()}">
    ${header}
    <div style="display:flex;flex-direction:column;gap:16px">${blocks}</div>
    <div class="q-nav">
      <button type="button" class="btn-block" data-action="back" style="${ghostBtn}">← Back</button>
      <button type="button" class="btn-block" data-action="next" style="${nextBtn}">${nextLabel}</button>
    </div>
    <div style="text-align:center;margin-top:14px">
      ${skipWarn}
      <button type="button" data-action="skip-end" style="font-family:inherit;font-size:15px;font-weight:700;color:var(--muted);background:none;border:none;padding:6px 8px;cursor:pointer;text-decoration:underline;text-underline-offset:3px">Skip questions — go to results</button>
    </div>
  </div>`;
}

function renderResults(){
  const rt = resultType();
  const rs = reasons();
  const goodCauseText = S.goodCauseText(state.answers);

  let formPrompt = 'Explain your reasons in your own words';
  if(rs.includes('Have a health reason that makes it hard to work 30 or more hours a week')) formPrompt = 'Explain the health reason that makes it hard for you to work 30 or more hours a week';
  else if(rs.includes('Take care of a child or adult who cannot care for themselves')) formPrompt = 'Explain your caretaking responsibilities or arrangement';
  else if(rs.includes(WORK_REASON_INCOME) || rs.includes(WORK_REASON_HOURS_30)) formPrompt = 'Explain your work hours, pay, and what proof you can send to DTA';
  else if(rs.includes(DISABILITY_OTHER_REASON)) formPrompt = 'Name the disability benefit or payment you receive';
  else if(rs.includes(HOUSING_EXEMPT_REASON)) formPrompt = 'Explain where you sleep and any barriers that make it hard to work';
  if(rt === 'goodcause') formPrompt = 'Explain why you had to miss work, school, or volunteer hours';

  const learnMore = `<p style="font-size:16px;margin:16px 0 0"><a href="${MLH_ABAWD_URL}" target="_blank" rel="noopener">Learn more about the SNAP work rules</a></p>`;

  let card = '';
  if(rt === 'ageinfo'){
    card = `<div style="border-radius:20px;overflow:hidden;border:1px solid #c7d6f0;box-shadow:0 1px 3px rgba(16,32,56,.08)">
      <div class="result-head" style="background:var(--soft);border-bottom:1px solid #c7d6f0">
        <span aria-hidden="true" style="width:52px;height:52px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;flex:none"><i data-lucide="info" class="icon-result"></i></span>
        <div>
          <div style="font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--blue)">Your answer</div>
          <h2 class="h-result" style="color:var(--navy)">These work rules may not apply to your age</h2>
        </div>
      </div>
      <div class="result-body">
        <p style="font-size:17px;line-height:1.6;color:#37414f;margin:0 0 16px">You said you are not between 18 and 64. The ABAWD work rules usually apply to adults in that age range. Contact DTA or a legal aid program to check your situation.</p>
        ${learnMore}
      </div></div>`;
  } else if(rt === 'exempt'){
    const items = rs.map(r => `<li style="display:flex;align-items:flex-start;gap:12px;font-size:17px;line-height:1.5;color:var(--ink)">
      <span aria-hidden="true" style="width:24px;height:24px;border-radius:50%;background:var(--green);color:#fff;display:inline-flex;align-items:center;justify-content:center;flex:none;margin-top:1px"><i data-lucide="check" style="width:14px;height:14px;stroke-width:3"></i></span>
      <span>${esc(r)}</span></li>`).join('');
    card = `<div style="border-radius:20px;overflow:hidden;border:1px solid var(--green-bd);box-shadow:0 1px 3px rgba(16,32,56,.08)">
      <div class="result-head" style="background:var(--green-bg);border-bottom:1px solid var(--green-bd)">
        <span aria-hidden="true" style="width:52px;height:52px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;flex:none"><i data-lucide="check" class="icon-result"></i></span>
        <div>
          <div style="font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--green)">Your answer</div>
          <h2 class="h-result" style="color:#14532d">Good news — you do not have to meet the work rules</h2>
        </div>
      </div>
      <div class="result-body">

        <ul style="list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:12px">${items}</ul>
        <p style="font-size:16px;line-height:1.6;color:#37414f;margin:16px 0 0">If this is based on work, send proof of your income and hours, such as pay stubs or a letter. If this is based on housing or another disability benefit, tell DTA the details so they can review your exemption.</p>
        ${learnMore}
      </div></div>`;
  } else if(rt === 'goodcause'){
    card = `<div style="border-radius:20px;overflow:hidden;border:1px solid #c7d6f0;box-shadow:0 1px 3px rgba(16,32,56,.08)">
      <div class="result-head" style="background:var(--soft);border-bottom:1px solid #c7d6f0">
        <span aria-hidden="true" style="width:52px;height:52px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;flex:none"><i data-lucide="calendar" class="icon-result"></i></span>
        <div>
          <div style="font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--blue)">Your answer</div>

        <p style="font-size:17px;line-height:1.6;color:#37414f;margin:0 0 16px">Tell DTA as soon as you can if you could not meet the work rules for one or more months because of a hard life event, like:</p>
        <div style="display:flex;align-items:flex-start;gap:12px;padding:16px 18px;background:var(--soft);border-radius:14px">
          <span aria-hidden="true" style="font-size:20px;flex:none">•</span>
          <span style="font-size:17px;line-height:1.55;overflow-wrap:anywhere">${esc(goodCauseText)}</span>

        ${learnMore}
      </div></div>`;
  } else {
    card = `<div style="border-radius:20px;overflow:hidden;border:1px solid var(--amber-bd);box-shadow:0 1px 3px rgba(16,32,56,.08)">
      <div class="result-head" style="background:var(--amber-bg);border-bottom:1px solid var(--amber-bd)">
        <span aria-hidden="true" style="width:52px;height:52px;border-radius:50%;background:#9a6a00;color:#fff;display:flex;align-items:center;justify-content:center;flex:none"><i data-lucide="clipboard-list" class="icon-result"></i></span>
        <div>
          <div style="font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#9a6a00">Your answer</div>
          <h2 class="h-result" style="color:#7a4a00">You may need to meet the work rules</h2>

      <div class="result-body">
        <p style="font-size:17px;line-height:1.6;color:#37414f;margin:0 0 18px">You did not pick a reason to be exempt. You can meet the work rules by doing <strong>one</strong> of these:</p>

            <span aria-hidden="true" style="width:30px;height:30px;border-radius:50%;background:#9a6a00;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;flex:none">1</span>
            <p style="margin:0;font-size:16.5px;line-height:1.55"><strong>Work or train 20 hours a week</strong> (80 hours a month). This can be paid work, unpaid work, or a DTA training program. Unpaid work can include internships or caring for family or friends who are not disabled or under age 6.</p>

        </div>
        <p style="font-size:16px;line-height:1.6;color:#37414f;margin:18px 0 0">For paid work, send DTA proof of income and hours, such as pay stubs or an employer letter. For unpaid or in-kind work, send a statement or letter that explains the arrangement and hours. If your work hours go below 80 hours in a month, report that to DTA by the 10th day of the next month.</p>
        <p style="font-size:16px;line-height:1.6;color:#37414f;margin:20px 0 0;overflow-wrap:anywhere">Already lost your SNAP because of the work rules? You can apply again any time. Email <a href="mailto:info@masslegalservices.org">info@masslegalservices.org</a> if you lost or are about to lose SNAP because of these rules.</p>
        ${learnMore}
      </div></div>`;
  }

  let form = '';
  if(rt === 'exempt' || rt === 'goodcause'){
    form = `<div class="card-box" style="margin:22px 0 0">
      <h3 style="font-size:21px;margin:0 0 6px">Send a statement to DTA</h3>
      <p style="font-size:16px;line-height:1.55;color:var(--muted);margin:0 0 18px">Fill in the blanks below. When you print or download, you will get a signed letter you can mail, fax, or upload to DTA. <em>What you type here is not saved on this device — print or download to keep a copy.</em></p>

      <p style="font-size:15px;line-height:1.5;color:var(--muted);margin:0 0 10px">${esc(formPrompt)}</p>
      <textarea id="f-explain" rows="4" placeholder="Type here…" style="width:100%;font-family:inherit;font-size:16px;line-height:1.5;padding:12px 14px;border:1.5px solid #cdd3dc;border-radius:10px;resize:vertical"></textarea>

      <li>Fax: (617) 887-8765, or visit a local DTA office</li>

  return `<div class="${animClass()}">${card}${form}${nextSteps}
    <div class="no-print q-nav" style="margin-top:22px">
      <button type="button" class="btn-block" data-action="restart" style="${ghostBtn};display:inline-flex;align-items:center;justify-content:center;gap:8px"><i data-lucide="rotate-ccw" class="icon-inline" aria-hidden="true"></i> Start over</button>
      <button type="button" class="btn-block" data-action="delete-answers" style="font-family:inherit;font-size:16px;font-weight:700;color:#a12b2b;background:none;border:2px solid #d8a2a2;border-radius:12px;padding:12px 20px;cursor:pointer;min-height:48px;touch-action:manipulation">Delete my answers</button>
    </div>
  </div>`;
}

function renderIcons(){
  if(typeof lucide !== 'undefined' && lucide.createIcons){
    lucide.createIcons({ attrs: { 'aria-hidden': 'true' } });
  }
}

/* ---- Finger / mouse signature pad (canvas) ----
 * Drawn locally and never saved or uploaded. Prints as a real image, so
 * DTA gets a genuine handwritten mark rather than a typed cursive font. */
function initSignaturePad(){
  const canvas = document.getElementById('sig-pad');
  if(!canvas){ sigCanvas = sigCtx = sigHint = null; return; }
  sigCanvas = canvas;
  sigHint = document.getElementById('sig-hint');
  sigDrawn = false;

  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth || 300;
  const h = canvas.clientHeight || 150;
  canvas.width = Math.round(w * dpr);
  canvas.height = Math.round(h * dpr);
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.lineWidth = 2.2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.strokeStyle = '#16202e'; ctx.fillStyle = '#16202e';
  sigCtx = ctx;

  let drawing = false, lastX = 0, lastY = 0;
  const at = (e) => { const r = canvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; };
  const start = (e) => {
    drawing = true;
    const p = at(e); lastX = p.x; lastY = p.y;
    if(!sigDrawn){ sigDrawn = true; if(sigHint) sigHint.style.display = 'none'; }
    ctx.beginPath(); ctx.arc(lastX, lastY, ctx.lineWidth / 2, 0, Math.PI * 2); ctx.fill();
    if(canvas.setPointerCapture && e.pointerId != null){ try{ canvas.setPointerCapture(e.pointerId); }catch(_){} }
    e.preventDefault();
  };
  const move = (e) => {
    if(!drawing) return;
    const p = at(e);
    ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y); ctx.stroke();
    lastX = p.x; lastY = p.y;
    e.preventDefault();
  };
  const end = () => { drawing = false; };
  canvas.addEventListener('pointerdown', start);
  canvas.addEventListener('pointermove', move);
  canvas.addEventListener('pointerup', end);
  canvas.addEventListener('pointerleave', end);
  canvas.addEventListener('pointercancel', end);
}

function clearSignature(){
  if(!sigCtx || !sigCanvas) return;
  const dpr = window.devicePixelRatio || 1;
  sigCtx.clearRect(0, 0, sigCanvas.width / dpr, sigCanvas.height / dpr);
  sigDrawn = false;
  if(sigHint) sigHint.style.display = '';
}

/* Export signature as a white-backed PNG so print/PDF keeps the ink. */
function captureSignatureDataURL(){
  if(!sigDrawn || !sigCanvas) return '';
  try{
    const out = document.createElement('canvas');
    out.width = sigCanvas.width;
    out.height = sigCanvas.height;
    const ctx = out.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, out.width, out.height);
    ctx.drawImage(sigCanvas, 0, 0);
    return out.toDataURL('image/png');
  }catch(_){ return ''; }
}

/* ---- Printable / downloadable "Statement to DTA" letter ---- */
function statementInnerHTML(sigSrc){
  const val = (id) => { const el = document.getElementById(id); return el ? el.value : ''; };
  const sigImg = (sigSrc === undefined) ? captureSignatureDataURL() : sigSrc;
  let today = '';
  try{ today = new Date().toLocaleDateString('en-US', {year:'numeric', month:'long', day:'numeric'}); }catch(_){}
  return SnapScreening.buildStatementHTML({
    name: val('f-name'),
    agency: val('f-agency'),
    explain: val('f-explain'),
    sigImg: sigImg || '',
    rt: resultType(),
    rs: reasons(),
    gcText: S.goodCauseText(state.answers),
    today
  });
}

function buildPrintRoot(){
  let root = document.getElementById('print-root');
  if(!root){ root = document.createElement('div'); root.id = 'print-root'; document.body.appendChild(root); }
  root.innerHTML = statementInnerHTML();
}

function printForm(){
  buildPrintRoot();
  const cleanup = () => document.body.classList.remove('printing-form');
  window.addEventListener('afterprint', cleanup, { once:true });
  document.body.classList.add('printing-form');
  // Wait a frame so the signature <img> can decode before the print snapshot.
  // Do not clear printing-form on a short timer — Chrome returns from print()
  // immediately, and a 2s cleanup was wiping the form mid Save-as-PDF.
  requestAnimationFrame(() => {
    requestAnimationFrame(() => { window.print(); });
  });
}

function downloadDoc(){
  // Word ignores data: URLs in HTML .doc files. Package as MHTML so the
  // signature PNG is a real related image part Word can display.
  const dataUrl = captureSignatureDataURL();
  const boundary = '----=_NextPart_CFO_SNAP_STMT';
  const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="utf-8"><title>SNAP Work Rules Statement</title>
<!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View><w:Zoom>100</w:Zoom></w:WordDocument></xml><![endif]-->
</head>
<body>${statementInnerHTML(dataUrl ? 'signature.png' : '')}</body>
</html>`;

  const wrap76 = (s) => (s.match(/.{1,76}/g) || []).join('\r\n');
  const htmlB64 = wrap76(btoa(unescape(encodeURIComponent(html))));

  const parts = [
    'MIME-Version: 1.0',
    'Content-Type: multipart/related; boundary="' + boundary + '"',
    '',
    '--' + boundary,
    'Content-Type: text/html; charset="utf-8"',
    'Content-Transfer-Encoding: base64',
    'Content-Location: statement.htm',
    '',
    htmlB64
  ];
  if(dataUrl){
    const pngB64 = dataUrl.replace(/^data:image\/png;base64,/, '');
    parts.push(
      '--' + boundary,
      'Content-Type: image/png',
      'Content-Transfer-Encoding: base64',
      'Content-Location: signature.png',
      '',
      wrap76(pngB64)
    );
  }
  parts.push('--' + boundary + '--', '');

  const blob = new Blob([parts.join('\r\n')], { type: 'application/msword' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'SNAP-Work-Rules-Statement.doc';
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

function render(){
  renderProgress();
  const stage = document.getElementById('stage');
  if(state.view === 'intro') stage.innerHTML = renderIntro();
  else if(state.view === 'question') stage.innerHTML = renderPage();
  else stage.innerHTML = (SAMPLE_MODE ? sampleBanner() : '') + renderResults();

  const heading = stage.querySelector('h1, h2');
  if(heading){ heading.setAttribute('tabindex', '-1'); }

  state.animate = false;
  renderIcons();
  initSignaturePad();
  persist();
}

function renderWithMotion(){
  state.animate = true;
  render();
}

/* ------------------------------------------------------------------ *
 * Event handling (delegation)
 * ------------------------------------------------------------------ */

document.addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if(!btn) return;

  const kind = btn.getAttribute('data-opt-kind');
  if(kind){
    const q = qById(btn.getAttribute('data-q-id'));
    if(!q) return;
    // Selecting an answer no longer moves you forward — use Next when ready.
    if(kind === 'yn'){
      setAns(q.id, btn.getAttribute('data-opt-val'));
      if(q.id === 'housing' && btn.getAttribute('data-opt-val') !== 'no'){
        delete state.answers.housingFollowup;
      }
      render();
    } else if(kind === 'multi'){
      const o = q.options[+btn.getAttribute('data-opt-idx')];
      const cur = Array.isArray(state.answers[q.id]) ? state.answers[q.id] : [];
      state.answers[q.id] = cur.includes(o.id) ? cur.filter(x => x !== o.id) : [...cur, o.id];
      render();
    } else if(kind === 'multi-none'){
      setAns(q.id, NONE);
      render();
    } else if(kind === 'single'){
      setAns(q.id, q.options[+btn.getAttribute('data-opt-idx')].id);
      render();
    } else if(kind === 'single-none'){
      setAns(q.id, NONE);
      render();
    }
    return;
  }

  const action = btn.getAttribute('data-action');
  if(!action) return;
  switch(action){
    case 'start':
      if(!canStart()) return;
      SAMPLE_MODE = false;
      if(state.answers.ageRange === 'no'){ state.view = 'results'; renderWithMotion(); return; }
      state.view = 'question'; state.step = 0; state.gc = false; state.helpOpen = {}; renderWithMotion(); break;
    case 'back': back(); break;
    case 'next': advance(); break;
    case 'skip-end': skipToEnd(); break;
    case 'toggle-help': { const id = btn.getAttribute('data-q-id'); if(id){ state.helpOpen[id] = !state.helpOpen[id]; render(); } break; }
    case 'toggle-hint': {
      const tip = btn.closest('.hint-tip');
      if(!tip) break;
      const willOpen = !tip.classList.contains('is-open');
      if(willOpen){
        document.querySelectorAll('.hint-tip.is-open').forEach(t => { if(t !== tip) setHintTipOpen(t, false); });
        setHintTipOpen(tip, true);
      } else {
        setHintTipOpen(tip, false);
      }
      break;
    }
    case 'restart':
      SAMPLE_MODE = false; // leaving the sample preview into a real (savable) session
      state.view = 'intro'; state.step = 0; state.gc = false; state.helpOpen = {}; state.answers = {}; renderWithMotion(); break;
    case 'delete-answers': deleteAnswers(); break;
    case 'go-back': window.location.href = SCREENING_HUB_URL; break;
    case 'print': printForm(); break;
    case 'download-doc': downloadDoc(); break;
    case 'sig-clear': clearSignature(); break;
  }
});

document.addEventListener('change', (e) => {
  if(e.target && e.target.id === 'agree'){
    state.agreed = e.target.checked;
    persist();
    updateStartBtn();
  }
  if(e.target && e.target.name === 'ageRange'){
    state.answers.ageRange = e.target.value;
    persist();
    updateStartBtn();
  }
});

function updateStartBtn(){
  const btn = document.getElementById('start-btn');
  if(btn){
    if(canStart()){
      btn.style.opacity = ''; btn.style.cursor = 'pointer'; btn.removeAttribute('aria-disabled');
    } else {
      btn.style.opacity = '.5'; btn.style.cursor = 'not-allowed'; btn.setAttribute('aria-disabled', 'true');
    }
  }
}

/* ------------------------------------------------------------------ *
 * Sample previews (demo only)
 * ?sample=exempt | goodcause | notexempt jumps straight to a sample
 * result screen, reusing the real result rendering so a sample can
 * never drift from the tool. Nothing is saved in this mode.
 * ------------------------------------------------------------------ */
function applySampleFromURL(){
  let p = '';
  try{ p = (new URLSearchParams(location.search).get('sample') || '').toLowerCase(); }catch(e){}
  if(!p) return false;
  if(p === 'exempt') state.answers = { child14:'yes', health:'yes' };
  else if(p === 'goodcause') state.answers = { goodcause:'transport' };
  else if(p === 'notexempt') state.answers = { goodcause: NONE };
  else if(p === 'meeting') state.answers = { working: 'hours_30' }; // legacy sample URL now shows the work-hours exemption.
  else return false;
  SAMPLE_MODE = true;
  state.view = 'results';
  state.gc = false;
  state.agreed = true;
  return true;
}

function sampleBanner(){
  return `<div class="no-print" style="display:flex;flex-wrap:wrap;align-items:center;gap:10px 16px;background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:14px;padding:14px 18px;margin:0 0 18px">
    <span style="font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#7a5a12">Sample result</span>
    <span style="font-size:16px;line-height:1.5;color:var(--amber-ink);flex:1;min-width:200px">An example of one outcome — no questions were answered, and nothing is saved.</span>
    <span style="display:flex;gap:14px"><a href="snap-screening.html" style="font-weight:700">← All samples</a><a href="snap-screening-v2.html" style="font-weight:700">Try it for real →</a></span>
  </div>`;
}

/* Re-fit the signature canvas when the viewport changes (e.g. phone rotation).
 * The bitmap is sized from clientWidth at draw time, so a later resize would
 * otherwise leave pointer coordinates misaligned. Re-init clears any ink. */
let sigResizeTimer = null;
function refitSignatureOnResize(){
  if(!document.getElementById('sig-pad')) return;
  clearTimeout(sigResizeTimer);
  sigResizeTimer = setTimeout(() => { if(document.getElementById('sig-pad')) initSignaturePad(); }, 200);
}
window.addEventListener('resize', refitSignatureOnResize, { passive: true });
window.addEventListener('orientationchange', refitSignatureOnResize);

if(!applySampleFromURL()){ loadPersisted(); }
initHintTips();
state.animate = true;
render();
</script>
</body>
</html>
